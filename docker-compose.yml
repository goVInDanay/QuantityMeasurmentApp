services:
    # ===================== MYSQL =====================
    mysql:
        image: mysql:8
        container_name: mysql-container
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_DATABASE: ${MYSQLDATABASE}
        ports:
            - "3307:3306"
        volumes:
            - mysql-data:/var/lib/mysql
        networks:
            - app-network

    # ===================== EUREKA =====================
    eureka-server:
        build: ./EurekaServer
        container_name: eureka-server
        ports:
            - "8761:8761"
        networks:
            - app-network

    # ===================== KAFKA STACK =====================
    zookeeper:
        image: confluentinc/cp-zookeeper:7.5.0
        container_name: zookeeper
        environment:
            ZOOKEEPER_CLIENT_PORT: 2181
            ZOOKEEPER_TICK_TIME: 2000
        ports:
            - "2181:2181"
        networks:
            - app-network

    kafka:
        image: confluentinc/cp-kafka:7.5.0
        container_name: kafka
        depends_on:
            - zookeeper
        ports:
            - "9092:9092"
        environment:
            KAFKA_BROKER_ID: 1
            KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
            KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
            KAFKA_DELETE_TOPIC_ENABLE: "true"
        networks:
            - app-network

    # ===================== AUTH =====================
    auth-service:
        build: ./AuthService
        container_name: auth-service
        depends_on:
            - mysql
            - eureka-server
        environment:
            SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQLDATABASE}
            SPRING_DATASOURCE_USERNAME: root
            SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
            JWT_SECRET: ${JWT_SECRET}
            JWT_EXPIRATION: ${JWT_EXPIRATION}
        ports:
            - "8083:8083"
        networks:
            - app-network

    # ===================== USER =====================
    user-service:
        build: ./UserService
        container_name: user-service
        depends_on:
            - mysql
            - eureka-server
        environment:
            SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQLDATABASE}
            SPRING_DATASOURCE_USERNAME: root
            SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
        ports:
            - "8082:8082"
        networks:
            - app-network

    # ===================== QUANTITY =====================
    quantity-service:
        build: ./QuantityService
        container_name: quantity-service
        depends_on:
            - kafka
            - eureka-server
        environment:
            SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
            SPRING_KAFKA_PRODUCER_VALUE_SERIALIZER: org.springframework.kafka.support.serializer.JsonSerializer
            SPRING_KAFKA_PRODUCER_PROPERTIES_SPRING_JSON_ADD_TYPE_HEADERS: "false"
            EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
        ports:
            - "8081:8081"
        networks:
            - app-network

    # ===================== HISTORY =====================
    history-service:
        build: ./HistoryService
        container_name: history-service
        depends_on:
            - kafka
            - mysql
            - eureka-server
        environment:
            SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQLDATABASE}
            SPRING_DATASOURCE_USERNAME: root
            SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
            SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
            SPRING_KAFKA_CONSUMER_GROUP_ID: history-group-3
            SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET: latest
            SPRING_KAFKA_CONSUMER_VALUE_DESERIALIZER: org.springframework.kafka.support.serializer.JsonDeserializer
            SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_TRUSTED_PACKAGES: "*"
            SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_USE_TYPE_HEADERS: "false"
            SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_VALUE_DEFAULT_TYPE: com.common.events.HistoryEvent
        ports:
            - "8084:8084"
        networks:
            - app-network

    # ===================== API GATEWAY =====================
    api-gateway:
        build: ./ApiGateway
        container_name: api-gateway
        depends_on:
            - eureka-server
        environment:
            EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
        ports:
            - "8080:8080"
        networks:
            - app-network

volumes:
    mysql-data:

networks:
    app-network:
        driver: bridge
