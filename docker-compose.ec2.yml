version: "3.8"

services:
    # ===================== MYSQL =====================
    mysql:
        image: mysql:8
        container_name: mysql-container
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_DATABASE: ${MYSQLDATABASE}
        ports:
            - "3307:3306"
        volumes:
            - mysql-data:/var/lib/mysql
        networks:
            - app-network

    # ===================== EUREKA =====================
    eureka-server:
        build: ./EurekaServer
        container_name: eureka-server
        ports:
            - "8761:8761"
        networks:
            - app-network

    # ===================== KAFKA =====================
    zookeeper:
        image: confluentinc/cp-zookeeper:7.5.0
        container_name: zookeeper
        environment:
            ZOOKEEPER_CLIENT_PORT: 2181
        ports:
            - "2181:2181"
        networks:
            - app-network

    kafka:
        image: confluentinc/cp-kafka:7.5.0
        container_name: kafka
        depends_on:
            - zookeeper
        ports:
            - "9092:9092"
        environment:
            KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        networks:
            - app-network

    # ===================== AUTH =====================
    auth-service:
        build: ./AuthService
        container_name: auth-service
        depends_on:
            - mysql
            - eureka-server
        environment:
            SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQLDATABASE}
            SPRING_DATASOURCE_USERNAME: root
            SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
            JWT_SECRET: ${JWT_SECRET}
            JWT_EXPIRATION: ${JWT_EXPIRATION}
        ports:
            - "8083:8083"
        networks:
            - app-network

    # ===================== USER =====================
    user-service:
        build: ./UserService
        container_name: user-service
        depends_on:
            - mysql
            - eureka-server
        environment:
            SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQLDATABASE}
            SPRING_DATASOURCE_USERNAME: root
            SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
        ports:
            - "8082:8082"
        networks:
            - app-network

    # ===================== QUANTITY =====================
    quantity-service:
        build: ./QuantityService
        container_name: quantity-service
        depends_on:
            - kafka
            - eureka-server
        environment:
            SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
            EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
        ports:
            - "8081:8081"
        networks:
            - app-network

    # ===================== HISTORY =====================
    history-service:
        build: ./HistoryService
        container_name: history-service
        depends_on:
            - kafka
            - mysql
            - eureka-server
        environment:
            SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQLDATABASE}
            SPRING_DATASOURCE_USERNAME: root
            SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
            EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
        ports:
            - "8084:8084"
        networks:
            - app-network

    # ===================== API GATEWAY =====================
    api-gateway:
        build: ./ApiGateway
        container_name: api-gateway
        depends_on:
            - eureka-server
        environment:
            EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
            JWT_SECRET: ${JWT_SECRET}
            JWT_EXPIRATION: ${JWT_EXPIRATION}
        ports:
            - "8080:8080"
        networks:
            - app-network

volumes:
    mysql-data:

networks:
    app-network:
        driver: bridge
