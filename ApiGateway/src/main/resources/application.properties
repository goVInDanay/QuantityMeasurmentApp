spring.application.name=api-gateway

server.port=8080

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
spring.cloud.loadbalancer.retry.enabled=true
eureka.client.registry-fetch-interval-seconds=5
eureka.client.initial-instance-info-replication-interval-seconds=5
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=https://quantitymeasurmentapp.onrender.com
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=quantity-service
spring.cloud.gateway.routes[1].uri=lb://quantity-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/quantity/**

spring.cloud.gateway.routes[2].id=user-service
spring.cloud.gateway.routes[2].uri=lb://user-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/users/**

spring.cloud.gateway.routes[3].id=history-service
spring.cloud.gateway.routes[3].uri=lb://history-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/history/**

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}


spring.config.import=optional:application-secret.properties