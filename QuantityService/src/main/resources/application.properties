spring.application.name=quantity-service

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
spring.cloud.loadbalancer.retry.enabled=true
eureka.client.registry-fetch-interval-seconds=5
eureka.client.initial-instance-info-replication-interval-seconds=5
eureka.instance.prefer-ip-address=true

server.port=8081

spring.config.import=optional:application-secret.properties

# ================= KAFKA =================

spring.kafka.bootstrap-servers=pkc-921jm.us-east-2.aws.confluent.cloud:9092

spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.properties.sasl.mechanism=PLAIN
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="${KAFKA_API_KEY}" password="${KAFKA_API_SECRET}";

# ================= PRODUCER =================

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# ================= OPTIONAL =================
spring.kafka.admin.auto-create=true

# (only needed if this service also consumes)
spring.kafka.consumer.properties.spring.json.trusted.packages=com.common.events